kind = "web"
previewPath = "/"
title = "Health Tracker"
version = "1.0.0"
id = "artifacts/health-tracker"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 24166
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/health-tracker run dev"

[services.env]
PORT = "24166"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/health-tracker", "run", "build"]
publicDir = "artifacts/health-tracker/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
