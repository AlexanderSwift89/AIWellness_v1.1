<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="description" content="Персонализированный трекер здоровья и питания">
  <meta property="og:title" content="Health Tracker">
  <meta property="og:description" content="Трекер питания, активности и сна">
  <title>Health Tracker – Трекер здоровья и питания</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app-shell">

    <!-- SCREEN: DASHBOARD -->
    <div class="screen screen--dashboard active" id="screen-dashboard">
      <header class="screen__header">
        <div class="header__user">
          <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=AlexHealth&backgroundColor=b6e3f4"
               alt="Аватар" class="header__avatar">
          <div>
            <h2 class="header__greeting">Привет, Алекс!</h2>
            <p class="header__date" id="current-date"></p>
          </div>
        </div>
        <button class="header__bell" aria-label="Уведомления" onclick="showToast('2 новых рекомендации')">
          <i class="fas fa-bell"></i>
          <span class="header__bell-badge">2</span>
        </button>
      </header>

      <div class="screen__body" id="dashboard-body">
        <div class="calories-card">
          <div class="calories-card__info">
            <p class="calories-card__label">КАЛОРИИ</p>
            <p class="calories-card__value"><strong>1 450</strong> / 2 000</p>
            <span class="calories-card__remaining">Осталось 550 ккал</span>
          </div>
          <div class="calories-card__ring">
            <svg viewBox="0 0 80 80" class="ring-svg">
              <circle cx="40" cy="40" r="32" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="8"/>
              <circle cx="40" cy="40" r="32" fill="none" stroke="white" stroke-width="8"
                      stroke-dasharray="201.1" stroke-dashoffset="56.3"
                      stroke-linecap="round" transform="rotate(-90 40 40)"/>
            </svg>
            <i class="fas fa-fire calories-card__ring-icon"></i>
          </div>
        </div>

        <div class="macros-row">
          <div class="macro-item">
            <p class="macro-item__value">65<span class="macro-item__target">/90г</span></p>
            <p class="macro-item__label">Белки</p>
            <div class="progress-bar"><div class="progress-bar__fill" style="width:72%;background:#3b82f6"></div></div>
          </div>
          <div class="macro-item">
            <p class="macro-item__value">45<span class="macro-item__target">/65г</span></p>
            <p class="macro-item__label">Жиры</p>
            <div class="progress-bar"><div class="progress-bar__fill" style="width:69%;background:#f59e0b"></div></div>
          </div>
          <div class="macro-item">
            <p class="macro-item__value">180<span class="macro-item__target">/250г</span></p>
            <p class="macro-item__label">Углеводы</p>
            <div class="progress-bar"><div class="progress-bar__fill" style="width:72%;background:#8b5cf6"></div></div>
          </div>
        </div>

        <section class="section">
          <h3 class="section__title">Текущие дефициты</h3>
          <div class="deficit-list" id="deficit-list"></div>
        </section>

        <section class="section">
          <h3 class="section__title">Рекомендации</h3>
          <div class="recommendation-list" id="recommendation-list"></div>
        </section>

        <section class="section">
          <h3 class="section__title">Приёмы пищи сегодня</h3>
          <div class="meals-list" id="meals-list"></div>
        </section>

        <div class="screen__spacer"></div>
      </div>
    </div>

    <!-- SCREEN: CHAT -->
    <div class="screen screen--chat" id="screen-chat">
      <header class="screen__header screen__header--simple">
        <h2 class="screen__header-title">Чат с ассистентом</h2>
        <button class="header__icon-btn" aria-label="Очистить чат" onclick="clearChat()">
          <i class="fas fa-trash-alt"></i>
        </button>
      </header>

      <div class="chat__messages" id="chat-messages"></div>

      <div class="chat__quick-actions">
        <button class="chip" onclick="sendQuickMessage('Записать завтрак')">🍳 Завтрак</button>
        <button class="chip" onclick="sendQuickMessage('Записать обед')">🥗 Обед</button>
        <button class="chip" onclick="sendQuickMessage('Записать ужин')">🍽️ Ужин</button>
        <button class="chip" onclick="sendQuickMessage('Выпил воды')">💧 Вода</button>
        <button class="chip" onclick="sendQuickMessage('Лег спать')">🌙 Сон</button>
        <button class="chip" onclick="sendQuickMessage('Сделал зарядку')">🏃 Активность</button>
      </div>

      <div class="chat__input-area">
        <input type="text" class="chat__input" id="chat-input"
               placeholder="Напишите, что вы съели..."
               onkeydown="if(event.key==='Enter') sendChatMessage()">
        <button class="chat__send-btn" onclick="sendChatMessage()">
          <i class="fas fa-paper-plane"></i>
        </button>
      </div>
    </div>

    <!-- SCREEN: PRODUCTS & RECIPES -->
    <div class="screen screen--products" id="screen-products">
      <header class="screen__header screen__header--with-back">
        <button class="header__back-btn" onclick="navigateTo('dashboard')">
          <i class="fas fa-arrow-left"></i>
        </button>
        <div class="header__center">
          <h2 class="screen__header-title" id="products-title">Продукты</h2>
          <p class="screen__header-subtitle" id="products-subtitle">Выберите дефицит на дашборде</p>
        </div>
        <button class="header__icon-btn" id="add-all-btn" onclick="addAllToCart()" style="display:none">
          <i class="fas fa-cart-plus"></i>
        </button>
      </header>

      <div class="tabs" id="products-tabs">
        <button class="tab tab--active" id="tab-products" onclick="switchTab('products')">Продукты</button>
        <button class="tab" id="tab-recipes" onclick="switchTab('recipes')">Рецепты</button>
      </div>

      <div class="screen__body" id="products-content"></div>
    </div>

    <!-- SCREEN: SHOPPING LIST -->
    <div class="screen screen--shopping" id="screen-shopping">
      <header class="screen__header screen__header--simple">
        <h2 class="screen__header-title">Список покупок</h2>
        <div class="header__actions">
          <button class="header__icon-btn" onclick="shareShoppingList()">
            <i class="fas fa-share-alt"></i>
          </button>
          <button class="header__icon-btn header__icon-btn--danger" onclick="clearShoppingList()">
            <i class="fas fa-trash"></i>
          </button>
        </div>
      </header>

      <div class="shopping-total-bar">
        <span class="shopping-total-bar__label"><i class="fas fa-receipt"></i> Итого:</span>
        <span class="shopping-total-bar__value" id="shopping-total">₽ 0</span>
      </div>

      <div class="screen__body" id="shopping-list-content"></div>
    </div>

    <!-- BOTTOM NAVIGATION -->
    <nav class="bottom-nav">
      <button class="bottom-nav__item bottom-nav__item--active" onclick="navigateTo('dashboard')" id="nav-dashboard">
        <i class="fas fa-th-large"></i>
        <span>Дашборд</span>
      </button>
      <button class="bottom-nav__item" onclick="navigateTo('chat')" id="nav-chat">
        <i class="fas fa-comment-dots"></i>
        <span>Чат</span>
      </button>
      <button class="bottom-nav__item" onclick="navigateTo('products')" id="nav-products">
        <i class="fas fa-apple-alt"></i>
        <span>Продукты</span>
      </button>
      <button class="bottom-nav__item" onclick="navigateTo('shopping')" id="nav-shopping">
        <div class="bottom-nav__icon-wrap">
          <i class="fas fa-shopping-cart"></i>
          <span class="bottom-nav__badge" id="cart-badge" style="display:none">0</span>
        </div>
        <span>Покупки</span>
      </button>
    </nav>

    <!-- Toast -->
    <div class="toast" id="toast"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
